name: DevSecOps Build & Deploy (ui)

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: daffa09/emobo-ecommerce-ui
  IMAGE_VERSION: 1.0.8

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout source
        uses: actions/checkout@v4

      # 🛡️ [DEVSECOPS] TAHAP 1: Scan Kodingan & Package NPM (SAST & SCA)
      # Ini penting banget buat Next.js buat ngecek dependencies di package.json
      - name: 🕵️‍♂️ Scan Code & Dependencies (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_PPN_RATE=${{ secrets.NEXT_PUBLIC_PPN_RATE }}
            NEXT_PUBLIC_APP_FEE=${{ secrets.NEXT_PUBLIC_APP_FEE }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
            ${{ env.IMAGE_NAME }}:latest

      # 🛡️ [DEVSECOPS] TAHAP 2: Scan Docker Image yang baru dibuat
      - name: 🐳 Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}'
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: ✅ Summary
        run: |
          echo "✅ Build, Scan, and Push success!"
          echo "📦 Image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}"
      
      - name: 🚀 Deploy UI Zero Downtime
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd ~/skripsi
            docker compose pull ui
            docker compose up -d --scale ui=2 --no-recreate ui
            echo "⏳ Waiting for Next.js to boot..."
            sleep 20
            docker compose up -d --scale ui=1 ui
            docker compose exec -T gateway nginx -s reload
            docker image prune -f

      # 🛡️ [DEVSECOPS] TAHAP 3: DAST (Nembak Dummy Attack ke UI lu)
      - name: ⚡ Dynamic Security Test (OWASP ZAP)
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true 
        with:
          target: 'https://skripsi.daffathan-labs.my.id'