name: DevSecOps Build & Deploy (ui)

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: daffa09/emobo-ecommerce-ui
  IMAGE_VERSION: 1.0.10

jobs:
  # ==========================================
  # NODE 1: SAST & SCA SCANNING
  # ==========================================
  sast-scan:
    name: 🕵️‍♂️ SAST & SCA (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: 🧩 Checkout source
        uses: actions/checkout@v4

      - name: 🕵️‍♂️ Scan Code & Dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # NODE 2: BUILD & PUSH IMAGE
  # ==========================================
  build-and-push:
    name: 🐳 Build & Push Image
    needs: sast-scan
    runs-on: ubuntu-latest
    steps:
      - name: 🧩 Checkout source
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_PPN_RATE=${{ secrets.NEXT_PUBLIC_PPN_RATE }}
            NEXT_PUBLIC_APP_FEE=${{ secrets.NEXT_PUBLIC_APP_FEE }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
            ${{ env.IMAGE_NAME }}:latest

  # ==========================================
  # NODE 3: CONTAINER SECURITY SCAN
  # ==========================================
  image-scan:
    name: 🛡️ Container Security Scan
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 🐳 Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}'
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL'

  # ==========================================
  # NODE 4: DEPLOYMENT
  # ==========================================
  deploy:
    name: 🚀 Deploy UI Zero Downtime
    needs: image-scan
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy to Fanthom Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd ~/skripsi
            docker compose pull ui
            docker compose up -d --scale ui=2 --no-recreate ui
            echo "⏳ Waiting for Next.js to boot..."
            sleep 20
            docker compose up -d --scale ui=1 ui
            docker compose exec -T gateway nginx -s reload
            docker image prune -f

  # ==========================================
  # NODE 5: DAST SCANNING
  # ==========================================
  dast-scan:
    name: ⚡ Dynamic Security Test (ZAP)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: ⚡ Dynamic Security Test (OWASP ZAP)
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true 
        with:
          target: 'https://skripsi.daffathan-labs.my.id'